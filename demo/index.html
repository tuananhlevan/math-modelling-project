<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epidemic Spread Simulation Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Epidemic Spread Simulation</h1>
            <p>Visualizing the impact of superspreaders in a spatially structured model.</p>
        </header>

        <main class="main-content">
            <section class="canvas-container">
                <canvas id="simulationCanvas" width="800" height="800"></canvas>
            </section>

            <aside class="control-panel">
                <div class="card">
                    <h2>Controls</h2>
                    
                    <div class="control-group">
                        <label>Model Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="modelType" value="1" checked> 
                                <span class="custom-radio"></span> Strong Infectiousness
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="modelType" value="2"> 
                                <span class="custom-radio"></span> Hub Model
                            </label>
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="popSlider">Environment Population: <span id="popValue">300</span></label>
                        <input type="range" id="popSlider" min="150" max="900" step="50" value="300">
                    </div>

                    <div class="control-group">
                        <label for="supSlider">Superspreader Prob: <span id="supValue">0.2</span></label>
                        <input type="range" id="supSlider" min="0" max="1" step="0.05" value="0.2">
                    </div>

                    <div class="control-group">
                        <label for="speedSlider">Simulation Speed: <span id="speedValue">Medium</span></label>
                        <input type="range" id="speedSlider" min="1" max="100" value="80">
                    </div>

                    <div class="action-buttons">
                        <button id="btnInit" class="btn btn-secondary">Initialize</button>
                        <button id="btnStep" class="btn btn-secondary">Step</button>
                        <button id="btnPlay" class="btn btn-primary">Play</button>
                        <button id="btnPause" class="btn btn-danger" style="display:none;">Pause</button>
                    </div>
                </div>

                <div class="card stats-card">
                    <h2>Statistics</h2>
                    <div class="stat-row">
                        <span>Timestep:</span>
                        <strong id="statTimestep">0</strong>
                    </div>
                    <div class="stat-row">
                        <span class="dot dot-s"></span> Susceptible (S):
                        <strong id="statS">0</strong>
                    </div>
                    <div class="stat-row">
                        <span class="dot dot-i"></span> Infected (I):
                        <strong id="statI">0</strong>
                    </div>
                    <div class="stat-row">
                        <span class="dot dot-r"></span> Recovered (R):
                        <strong id="statR">0</strong>
                    </div>
                    <div class="stat-row mt-3">
                        <span>Percolated:</span>
                        <strong id="statPercolated" class="status-badge false">No</strong>
                    </div>
                </div>

                <div class="legend-card card">
                    <h2>Legend</h2>
                    <ul>
                        <li><span class="dot dot-s"></span> Normal</li>
                        <li><span class="dot dot-s super"></span> Superspreader</li>
                        <li><span class="line-legend"></span> Infection Path</li>
                    </ul>
                </div>
            </aside>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
